user root;
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    access_log off;

    sendfile on;
    keepalive_timeout 15s;
    keepalive_requests 100;

    # Tor delivers every request via the same AF_UNIX socket, so $remote_addr
    # is identical for all clients. Per-IP keys are useless; rate-limit on the
    # server scope to bound the total request and connection budget.
    limit_conn_zone $server_name zone=perserver_conn:1m;
    limit_req_zone  $server_name zone=perserver_req:1m rate=20r/s;

    # Suppress the "<center>nginx</center>" string from default error bodies.
    proxy_intercept_errors on;
    error_page 400 401 402 403 404 405 408 413 414 429 500 502 503 504 = @blank;

    server {
        listen unix:/var/run/tor/hidden_service.sock;

        client_body_timeout 10s;
        client_header_timeout 10s;
        send_timeout 10s;
        reset_timedout_connection on;

        client_max_body_size 1m;
        client_body_buffer_size 16k;
        large_client_header_buffers 2 4k;

        limit_conn perserver_conn 256;
        limit_req  zone=perserver_req burst=40 nodelay;

        if ($request_method !~ ^(GET|POST|OPTIONS)$ ) {
            return 444;
        }

        location @blank {
            internal;
            default_type text/plain;
            return 200 "";
        }

        location / {
            proxy_pass http://unix:/var/run/app/engine.sock;
            proxy_http_version 1.1;

            # Strip every client-controlled identity / forwarding header so a
            # malicious Tor client cannot spoof origin to the Rust backend.
            proxy_set_header Host              $http_host;
            proxy_set_header Connection        "";
            proxy_set_header X-Forwarded-For   "";
            proxy_set_header X-Real-IP         "";
            proxy_set_header X-Forwarded-Host  "";
            proxy_set_header X-Forwarded-Proto "";
            proxy_set_header X-Forwarded-Port  "";
            proxy_set_header Forwarded         "";
            proxy_set_header Referer           "";

            # Hide upstream identity from Tor clients.
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
            proxy_hide_header Date;

            proxy_buffering off;
            proxy_request_buffering on;

            proxy_connect_timeout 3s;
            proxy_send_timeout    5s;
            proxy_read_timeout    10s;
        }
    }
}
