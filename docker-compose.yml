services:
  tor:
    image: osminogin/tor-simple
    networks:
      - tor_net
    volumes:
      - ./infra/tor/keys:/var/lib/tor/hidden_service/
      - tor_socket_dir:/var/run/tor/
      - ./tor/torrc:/etc/tor/torrc:ro
    read_only: true
    security_opt:
      - no-new-privileges:true

  proxy:
    image: nginx:alpine
    networks:
      - app_net
    volumes:
      - tor_socket_dir:/var/run/tor/
      - app_socket_dir:/var/run/app/
      - ./nginx/proxy_seguro.conf:/etc/nginx/nginx.conf:ro
    read_only: true
    cap_drop:
      - ALL

networks:
  tor_net:
    internal: false
  app_net:
    internal: true

volumes:
  tor_socket_dir:
  app_socket_dir:
