services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - app_socket_dir:/var/run/app/
      - app_data:/app/data
    environment:
      DATABASE_PATH: /app/data/ledger
      SOCKET_PATH: /var/run/app/engine.sock
      MONERO_RPC_URL: http://host.docker.internal:18083/json_rpc
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN must be set in .env}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 500
    mem_limit: 512m
    restart: unless-stopped

  tor:
    build:
      context: ./tor
      dockerfile: Dockerfile
    networks:
      - tor_net
    volumes:
      - ./tor/keys:/var/lib/tor/hidden_service/
      - tor_socket_dir:/var/run/tor/
      - ./tor/torrc:/etc/tor/torrc:ro
    read_only: true
    tmpfs:
      - /var/lib/tor:size=32M,mode=0700,uid=100,gid=100
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    mem_limit: 256m
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    networks:
      - app_net
    volumes:
      - tor_socket_dir:/var/run/tor/
      - app_socket_dir:/var/run/app/
      - ./nginx/proxy_seguro.conf:/etc/nginx/nginx.conf:ro
    read_only: true
    tmpfs:
      - /var/run:size=2M,mode=0755
      - /var/cache/nginx:size=16M,mode=0777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    mem_limit: 128m
    restart: unless-stopped

networks:
  tor_net:
    internal: false
  app_net:
    internal: true

volumes:
  tor_socket_dir:
  app_socket_dir:
  app_data:
