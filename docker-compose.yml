services:
  tor:
    image: osminogin/tor-simple
    networks:
      - tor_net
    volumes:
      - ./tor/keys:/var/lib/tor/hidden_service/
      - tor_socket_dir:/var/run/tor/
      - ./tor/torrc:/etc/tor/torrc:ro
    read_only: true
    tmpfs:
      - /var/lib/tor:size=32M,mode=0700
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    mem_limit: 256m
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    networks:
      - app_net
    volumes:
      - tor_socket_dir:/var/run/tor/
      - app_socket_dir:/var/run/app/
      - ./nginx/proxy_seguro.conf:/etc/nginx/nginx.conf:ro
    read_only: true
    tmpfs:
      - /var/run:size=2M,mode=0755
      - /var/cache/nginx:size=16M,mode=0755
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    mem_limit: 128m
    restart: unless-stopped

networks:
  tor_net:
    internal: false
  app_net:
    internal: true

volumes:
  tor_socket_dir:
  app_socket_dir:
